<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Raio-X do Banco de Dados</title>
</head>
<body style="padding: 40px; font-family: sans-serif;">

    <h2>Raio-X do Sistema</h2>
    <p>Vamos ver o que o computador está enxergando de verdade.</p>
    <button id="btn-entrar" style="padding: 15px; background: #000; color: #fff; cursor: pointer; border-radius: 5px;">🔍 Fazer Raio-X</button>
    
    <pre id="resultado" style="background: #eee; padding: 20px; margin-top: 20px; border-radius: 8px; font-size: 16px; white-space: pre-wrap; word-wrap: break-word; font-weight: bold;">Aguardando clique...</pre>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKS7qoxoM3z67ScthfO-jKsn4Knq33xb4",
            authDomain: "damas-no-plano.firebaseapp.com",
            projectId: "damas-no-plano",
            storageBucket: "damas-no-plano.firebasestorage.app",
            messagingSenderId: "559105165374",
            appId: "1:559105165374:web:9569013350cd1219b1e96f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btn-entrar').onclick = async () => {
            const painel = document.getElementById('resultado');
            painel.innerText = "Pensando...";
            
            try {
                const credencial = await signInWithPopup(auth, new GoogleAuthProvider());
                const emailLogado = credencial.user.email.toLowerCase();
                
                let log = `✅ 1. Login com o Google funcionou.\n`;
                log += `📧 O Google diz que o e-mail que logou é: [${emailLogado}]\n\n`;
                
                log += `⏳ 2. Indo no Firebase procurar a pasta 'usuarios'...\n`;
                painel.innerText = log;

                const pastaUsuarios = await getDocs(collection(db, "usuarios"));
                
                if (pastaUsuarios.empty) {
                    log += `❌ ERRO BIZARRO: O código achou a pasta 'usuarios' VAZIA ou não achou a pasta!\n`;
                    log += `(Confira se a coleção no Firebase não foi criada com um espaço invisível no nome, ex: 'usuarios ')`;
                } else {
                    log += `📂 3. Sucesso! Encontrei estes e-mails dentro do seu banco de dados:\n`;
                    let achou = false;
                    
                    pastaUsuarios.forEach((documento) => {
                        const emailNoBanco = documento.id;
                        log += `   -> [${emailNoBanco}]\n`;
                        if (emailNoBanco === emailLogado) {
                            achou = true;
                        }
                    });
                    
                    log += `\n`;
                    if (achou) {
                        log += `🎉 CONCLUSÃO: Tudo perfeito! O e-mail do Google bateu idêntico com o do banco. Se não estava abrindo antes, era só o cache (memória velha) do iPad atrapalhando.`;
                    } else {
                        log += `🚨 CONCLUSÃO: Os nomes NÃO BATEM. Veja os colchetes [ ] lá no passo 1 e no passo 3. Tem alguma letra ou espaço de diferença entre eles.`;
                    }
                }
                painel.innerText = log;

            } catch (erro) {
                painel.innerText = "⚠️ ERRO NO SISTEMA: " + erro.message;
            }
        };
    </script>
</body>
</html>
