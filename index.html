<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste do Cadeado</title>
</head>
<body style="padding: 50px; font-family: Arial;">

    <h1>Laboratório de Teste</h1>
    <button id="btn-entrar" style="padding: 15px; font-size: 16px; cursor: pointer;">Testar Login do Google</button>
    <h2 id="resultado" style="color: blue; margin-top: 20px;">Esperando você clicar...</h2>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Sua chave purinha, sem alterações
        const firebaseConfig = {
            apiKey: "AIzaSyDKS7qoxoM3z67ScthfO-jKsn4Knq33xb4",
            authDomain: "damas-no-plano.firebaseapp.com",
            projectId: "damas-no-plano",
            storageBucket: "damas-no-plano.firebasestorage.app",
            messagingSenderId: "559105165374",
            appId: "1:559105165374:web:9569013350cd1219b1e96f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('btn-entrar').onclick = async () => {
            const painel = document.getElementById('resultado');
            painel.innerText = "Pensando...";
            
            try {
                // 1. Tenta fazer o login
                const credencial = await signInWithPopup(auth, new GoogleAuthProvider());
                const email = credencial.user.email.toLowerCase();
                painel.innerText = `Login feito com: ${email}. Procurando na Lista VIP...`;

                // 2. Tenta ler o banco de dados
                const docSnap = await getDoc(doc(db, "usuarios", email));
                
                if (docSnap.exists()) {
                    painel.innerText = "✅ SUCESSO ABSOLUTO! O banco de dados te achou e você é VIP.";
                    painel.style.color = "green";
                } else {
                    painel.innerText = "❌ BARRADO! Você logou, mas não achou esse e-mail na pasta 'usuarios'.";
                    painel.style.color = "red";
                }
            } catch (erro) {
                painel.innerText = "⚠️ ERRO NO SISTEMA: " + erro.message;
                painel.style.color = "red";
            }
        };
    </script>
</body>
</html>
